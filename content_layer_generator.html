<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Layer Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; padding: 2rem; }
.layout { display: grid; grid-template-columns: 1fr 360px; gap: 2rem; align-items: start; max-width: 1260px; margin: 0 auto; }
.left { min-width: 0; }
.right { position: sticky; top: 2rem; }
.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 18px; font-weight: 500; }
.header p { font-size: 13px; color: #666; margin-top: 4px; }
.controls { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 0.75rem; flex-wrap: wrap; }
.control-group { display: flex; flex-direction: column; gap: 6px; }
.group-label { font-size: 10px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; padding-bottom: 4px; border-bottom: 0.5px solid #eee; margin-bottom: 2px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
select, input[type=number] { height: 34px; padding: 0 10px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #111; font-size: 13px; font-family: inherit; min-width: 120px; }
input[type=number] { min-width: 72px; }
.field-row { display: flex; gap: 8px; }
.btn { height: 34px; padding: 0 16px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #111; font-size: 13px; font-family: inherit; cursor: pointer; white-space: nowrap; }
.btn:hover { background: #f5f5f5; }
.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-primary:hover { opacity: 0.85; }
.btn-random { background: #fff; color: #111; border: 0.5px solid #ccc; letter-spacing: 0.01em; }
.btn-random:hover { background: #f5f5f5; }
.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
.btn-copy { background: #111; color: #fff; border-color: #111; width: 100%; justify-content: center; }
.btn-copy:hover { opacity: 0.85; }
.divider { width: 0.5px; background: #eee; height: 60px; align-self: center; margin: 0 4px; }
.generate-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 1.5rem; margin-top: 0.75rem; }
.stats { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat { background: #f5f5f5; border-radius: 8px; padding: 10px 12px; flex: 1; min-width: 60px; }
.stat-val { font-size: 15px; font-weight: 500; }
.stat-label { font-size: 11px; color: #666; margin-top: 2px; }
.card-list { display: flex; flex-direction: column; gap: 8px; }
.card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; overflow: hidden; transition: border-color 0.1s; }
.card.selected { border-color: #111; }
.card-head { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; cursor: pointer; }
.card-head:hover { background: #f9f9f9; }
.card-num { font-size: 12px; color: #666; font-weight: 500; min-width: 32px; }
.card-preview { font-size: 13px; color: #111; flex: 1; margin: 0 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-body { border-top: 0.5px solid #e0e0e0; padding: 12px 14px; }
.layer { margin-bottom: 10px; }
.layer:last-child { margin-bottom: 0; }
.layer-label { font-size: 10px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.slot-row { display: flex; gap: 10px; padding: 4px 0; border-bottom: 0.5px solid #f0f0f0; }
.slot-row:last-child { border-bottom: none; }
.slot-name { font-size: 11px; font-weight: 500; color: #bbb; text-transform: uppercase; letter-spacing: 0.06em; min-width: 72px; padding-top: 1px; }
.slot-val { font-size: 12px; color: #333; line-height: 1.5; }
.prompt-box { margin-top: 12px; background: #f5f5f5; border-radius: 8px; padding: 10px 12px; font-size: 11.5px; color: #444; line-height: 1.8; font-family: 'SF Mono', 'Fira Code', monospace; white-space: pre-wrap; }
.card-copy-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
.dl-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }

/* ── Assembly panel ── */
.panel { border: 0.5px solid #e0e0e0; border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.panel-title { font-size: 13px; font-weight: 500; }
.panel-card-id { font-size: 12px; color: #888; margin-top: 2px; }
.layer-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid #f0f0f0; }
.layer-row:last-child { border-bottom: none; }
.layer-check { width: 16px; height: 16px; cursor: pointer; accent-color: #111; }
.layer-name { font-size: 12px; font-weight: 600; color: #111; min-width: 80px; letter-spacing: 0.02em; }
.mode-toggle { display: flex; border: 0.5px solid #ddd; border-radius: 6px; overflow: hidden; margin-left: auto; }
.mode-btn { height: 26px; padding: 0 10px; font-size: 11px; font-family: inherit; border: none; background: #fff; color: #888; cursor: pointer; }
.mode-btn.active { background: #111; color: #fff; }
.panel-preview { width: 100%; min-height: 200px; padding: 10px 12px; border: 0.5px solid #e0e0e0; border-radius: 8px; font-size: 11.5px; font-family: 'SF Mono', 'Fira Code', monospace; color: #333; line-height: 1.8; resize: vertical; background: #fafafa; }
.panel-preview:focus { outline: none; border-color: #aaa; }
.panel-actions { display: flex; gap: 8px; }
.panel-empty { font-size: 13px; color: #aaa; text-align: center; padding: 2rem 0; }
</style>
</head>
<body>
<div class="layout">

<!-- ── LEFT ── -->
<div class="left">

<div class="header">
  <h1>Content layer generator</h1>
  <p>Combined SUBJECT · LOCATION · WARDROBE — CAPTURE and ACTION are separate nodes</p>
</div>

<div class="controls">
  <!-- SHARED -->
  <div class="control-group">
    <div class="group-label">Shared</div>
    <div class="field-row">
      <div class="field">
        <label>Region</label>
        <select id="region">
          <option value="random">— Random —</option>
          <option value="NA">North America</option>
          <option value="UK">UK</option>
          <option value="DE" selected>Germany</option>
          <option value="NL">Netherlands</option>
        </select>
      </div>
      <div class="field">
        <label>Gender</label>
        <select id="gender">
          <option value="F" selected>Women</option>
          <option value="M">Men</option>
        </select>
      </div>
      <div class="field">
        <label>Age Range</label>
        <div style="display:flex;gap:5px;align-items:center;">
          <input type="number" id="age-min" value="35" min="18" max="90" style="min-width:54px;width:54px;">
          <span style="font-size:12px;color:#aaa;">–</span>
          <input type="number" id="age-max" value="50" min="18" max="90" style="min-width:54px;width:54px;">
        </div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- SUBJECT -->
  <div class="control-group">
    <div class="group-label">Subject</div>
    <div class="field-row">
      <div class="field">
        <label>Skin</label>
        <select id="tone">
          <option value="regional" selected>Regional</option>
          <option value="random">— Random —</option>
          <option value="fair">Fair (I–II)</option>
          <option value="light">Light (II–III)</option>
          <option value="light-medium">Light-Medium (III)</option>
          <option value="medium">Medium (IV)</option>
          <option value="medium-deep">Medium-Deep (IV–V)</option>
          <option value="deep">Deep (V–VI)</option>
        </select>
      </div>
      <div class="field">
        <label>Hair Length</label>
        <select id="hair-length">
          <option value="random">— Random —</option>
          <option value="xshort">Extra Short</option>
          <option value="short">Short</option>
          <option value="medium" selected>Medium</option>
          <option value="long">Long</option>
        </select>
      </div>
      <div class="field">
        <label>Hair Color</label>
        <select id="hair-color">
          <option value="age-matched" selected>Age-matched</option>
          <option value="random">— Random —</option>
          <option value="blonde">Blonde</option>
          <option value="light-brown">Light Brown</option>
          <option value="dark-brown">Dark Brown</option>
          <option value="black">Black</option>
          <option value="auburn">Auburn</option>
          <option value="gray">Grey / Silver</option>
          <option value="white">White</option>
        </select>
      </div>
    </div>
    <div class="field-row" style="margin-top:6px;">
      <div class="field">
        <label>Body Type</label>
        <select id="body-type">
          <option value="random" selected>— Random —</option>
          <option value="slim">Slim / Lean</option>
          <option value="athletic">Athletic</option>
          <option value="average">Average</option>
          <option value="curvy">Curvy (F) / Stocky (M)</option>
          <option value="overweight">Overweight</option>
          <option value="plus">Plus Size</option>
          <option value="petite">Petite / Compact</option>
          <option value="tall">Tall</option>
        </select>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- WARDROBE -->
  <div class="control-group">
    <div class="group-label">Wardrobe</div>
    <div class="field-row">
      <div class="field">
        <label>Style</label>
        <select id="style">
          <option value="random">— Random —</option>
          <option value="everyday" selected>Everyday</option>
          <option value="elevated">Elevated</option>
          <option value="smart">Smart</option>
          <option value="social">Social</option>
          <option value="offduty">Off-duty</option>
          <option value="lounge">Lounge</option>
          <option value="active">Active</option>
        </select>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ENVIRONMENT -->
  <div class="control-group">
    <div class="group-label">Environment</div>
    <div class="field-row">
      <div class="field">
        <label>Tier</label>
        <select id="tier">
          <option value="random">— Random —</option>
          <option value="budget">Budget</option>
          <option value="mid" selected>Mid</option>
          <option value="established">Established</option>
          <option value="affluent">Affluent</option>
          <option value="luxury">Luxury</option>
        </select>
      </div>
      <div class="field">
        <label>Scene</label>
        <select id="room">
          <option value="random">— Random —</option>
          <option value="living" selected>Living Room</option>
          <option value="kitchen">Kitchen</option>
          <option value="bedroom">Bedroom</option>
          <option value="bathroom">Bathroom</option>
          <option value="overview">Overview</option>
          <option value="car">Car Interior</option>
          <option value="office">Office</option>
          <option value="outdoors">Outdoors</option>
        </select>
      </div>
      <div class="field">
        <label>Time</label>
        <select id="time">
          <option value="day" selected>Day</option>
          <option value="night">Night</option>
        </select>
      </div>
      <div class="field">
        <label>Space</label>
        <select id="tidiness">
          <option value="random">— Random —</option>
          <option value="pristine">Pristine</option>
          <option value="tidy">Tidy</option>
          <option value="lived" selected>Lived-in</option>
          <option value="messy">Messy</option>
        </select>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- POSE -->
  <div class="control-group">
    <div class="group-label">Pose</div>
    <div class="field-row">
      <div class="field">
        <label>Shot type</label>
        <select id="pose">
          <option value="random">— Random —</option>
          <option value="talking_cam" selected>Talking to camera</option>
          <option value="selfie">Selfie angle</option>
          <option value="earphones">Earphones — on a call</option>
          <option value="microphone">Microphone — influencer</option>
          <option value="podcast">Podcast setup</option>
          <option value="fullbody">Full body — neutral bg</option>
          <option value="showing_product">Showing product</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="generate-row">
  <div class="field">
    <label>Count</label>
    <input type="number" id="count" value="20" min="1" max="200" />
  </div>
  <button class="btn btn-primary" onclick="generate()">Generate</button>
  <button class="btn btn-random" onclick="globalRandom()" title="Randomise all parameters and output one set">✦ Random</button>
  <button class="btn" onclick="clearSets()" title="Clear all generated sets">Clear</button>
</div>

<div class="stats" id="stats" style="display:none">
  <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-label">sets</div></div>
  <div class="stat"><div class="stat-val" id="s-demo">—</div><div class="stat-label">demographic</div></div>
  <div class="stat"><div class="stat-val" id="s-tone">—</div><div class="stat-label">skin tone</div></div>
  <div class="stat"><div class="stat-val" id="s-style">—</div><div class="stat-label">wardrobe</div></div>
  <div class="stat"><div class="stat-val" id="s-env">—</div><div class="stat-label">environment</div></div>
</div>

<div class="dl-row" id="dl-row" style="display:none">
  <button class="btn" onclick="downloadTxt()">Download .txt (### separated)</button>
  <button class="btn" onclick="copyAll()">Copy all</button>
</div>

<div id="list" class="card-list"></div>

</div><!-- /left -->

<!-- ── RIGHT — Assembly panel ── -->
<div class="right">
  <div class="panel">
    <div>
      <div class="panel-title">Assembled output</div>
      <div class="panel-card-id" id="panel-card-id">No card selected</div>
    </div>

    <!-- Layer controls -->
    <div id="layer-controls">
      <div class="layer-row">
        <input class="layer-check" type="checkbox" id="chk-subject" checked onchange="updatePanel()">
        <span class="layer-name">SUBJECT</span>
        <div class="mode-toggle">
          <button class="mode-btn active" id="mode-subject-text" onclick="setMode('subject','text')">Text</button>
          <button class="mode-btn" id="mode-subject-img" onclick="setMode('subject','img')">Img ref</button>
        </div>
      </div>
      <div class="layer-row">
        <input class="layer-check" type="checkbox" id="chk-location" checked onchange="updatePanel()">
        <span class="layer-name">LOCATION</span>
        <div class="mode-toggle">
          <button class="mode-btn active" id="mode-location-text" onclick="setMode('location','text')">Text</button>
          <button class="mode-btn" id="mode-location-img" onclick="setMode('location','img')">Img ref</button>
        </div>
      </div>
      <div class="layer-row">
        <input class="layer-check" type="checkbox" id="chk-wardrobe" checked onchange="updatePanel()">
        <span class="layer-name">WARDROBE</span>
        <div class="mode-toggle">
          <button class="mode-btn active" id="mode-wardrobe-text" onclick="setMode('wardrobe','text')">Text</button>
          <button class="mode-btn" id="mode-wardrobe-img" onclick="setMode('wardrobe','img')">Img ref</button>
        </div>
      </div>
      <div class="layer-row">
        <input class="layer-check" type="checkbox" id="chk-pose" checked onchange="updatePanel()">
        <span class="layer-name">POSE</span>
        <div class="mode-toggle">
          <button class="mode-btn active" id="mode-pose-text" onclick="setMode('pose','text')">Text</button>
          <button class="mode-btn" id="mode-pose-img" onclick="setMode('pose','img')">Img ref</button>
        </div>
      </div>
    </div>

    <textarea class="panel-preview" id="panel-preview" readonly placeholder="Select a card or hit ✦ Random…"></textarea>

    <div class="panel-actions">
      <button class="btn btn-sm btn-copy" onclick="panelCopy()">Copy</button>
      <button class="btn btn-sm" onclick="panelDownload()">Export .txt</button>
    </div>
  </div>
</div><!-- /right -->

</div><!-- /layout -->

<script>

// UTILITIES

function pick(arr) { if (!arr || !arr.length) return ''; return arr[Math.floor(Math.random() * arr.length)]; }
function pickAge(lo, hi) {
  lo = parseInt(lo); hi = parseInt(hi);
  if (lo > hi) [lo, hi] = [hi, lo];
  return Math.floor(Math.random() * (hi - lo + 1)) + lo;
}
function ageToKey(age) {
  if (age <= 25) return '18-25';
  if (age <= 35) return '25-35';
  if (age <= 50) return '35-50';
  if (age <= 60) return '45-60';
  return '65+';
}
function trimFirst(str, n) {
  // Take first n comma-separated clauses
  return str.split(',').slice(0,n).join(',').trim();
}

  '65+':   ['white','silver-white','soft grey','pure white','warm silver-grey']
};

// ─────────────────────────────────────────────────────────────────────────────
// BUILD FUNCTIONS
// ─────────────────────────────────────────────────────────────────────────────
function buildSubject(gender, ageMin, ageMax, region, toneRaw, hairLengthRaw, hairColorRaw, bodyTypeRaw) {
  const age  = pickAge(ageMin, ageMax);
  const key  = ageToKey(age);

  // Skin — regional pool, full-random, or manual override
  const tone = toneRaw === 'regional' ? pick(SKIN_REGIONAL[region])
             : toneRaw === 'random'   ? pick(ALL_TONES)
             : toneRaw;
  const skin = pick(SKIN[tone][key]);

  const build = (bodyTypeRaw && bodyTypeRaw !== 'random' && BODY_TYPE_DESC[bodyTypeRaw])
    ? pick(BODY_TYPE_DESC[bodyTypeRaw][gender])
    : pick(BUILD[gender]);
  const face    = pick(FACE[gender]);
  const eyes    = pick(EYES[gender]);
  const notable = Math.random() < 0.6 ? pick(NOTABLE[gender]) : null;

  // Resolve hair
  const hairLength = hairLengthRaw === 'random' ? pick(ALL_HAIR_LENGTHS) : hairLengthRaw;
  const COLOR_MAP  = { blonde:'blonde', 'light-brown':'light brown', 'dark-brown':'dark brown',
                       black:'black', auburn:'auburn', gray:'grey', white:'white' };
  const hairColor  = (hairColorRaw === 'age-matched' || hairColorRaw === 'random')
                   ? pick(HAIR_COLOR_POOL[key])
                   : (COLOR_MAP[hairColorRaw] || pick(HAIR_COLOR_POOL[key]));
  const lengthDesc = pick(HAIR_LENGTH_DESC[hairLength][gender]);
  const hair = `${lengthDesc} ${hairColor} hair`;

  return { age, build, face, skin, hair, eyes, notable };
}

function getContextStyle(style, room, time) {
  if (room === 'bathroom') return 'lounge';
  if (room === 'bedroom' && time === 'night') return 'lounge';
  if (room === 'bedroom' && time === 'day') return Math.random() < 0.6 ? 'lounge' : style;
  if (room === 'office') {
    // No loungewear or activewear in an office
    if (style === 'lounge' || style === 'active') return pick(['everyday','elevated','smart']);
    return style;
  }
  if (room === 'outdoors') {
    // No lounge outdoors
    if (style === 'lounge') return pick(['everyday','offduty','active']);
    return style;
  }
  if (room === 'car') {
    // No loungewear in a car — could be going anywhere
    if (style === 'lounge') return pick(['everyday','offduty','elevated']);
    return style;
  }
  return style;
}

function buildWardrobe(gender, ageMin, ageMax, region, style, room, time) {
  const effectiveStyle = getContextStyle(style, room, time);
  const age = pickAge(ageMin, ageMax);
  const ageRange = ageToKey(age);
  const base = TAXONOMY[gender][ageRange];
  const regional = REGIONAL_WARD[region][gender];
  const isDominant = effectiveStyle === 'lounge' || effectiveStyle === 'active';
  const styleData = STYLE_WARD[effectiveStyle] ? STYLE_WARD[effectiveStyle][gender] : null;

  function pool(slot) {
    const b = base[slot] || [];
    const r = regional[slot] || [];
    const s = styleData ? (styleData[slot] || []) : [];
    if (isDominant && s.length) return [...s, ...s, ...r.slice(0,2)];
    if (s.length) return [...b, ...s, ...s, ...r];
    return [...b, ...r];
  }

  // Outdoors: outer is very likely; lounge/bathroom/bedroom: suppress bag
  const outerChance = room === 'outdoors' ? 0.85 : (isDominant ? 1 : 0.65);
  const hasOuter = Math.random() < outerChance;
  const suppressBag = effectiveStyle === 'lounge' || room === 'bathroom' || room === 'car';
  const outfit = {};
  ['top','bottom','shoes','accessory'].forEach(slot => {
    const p = pool(slot);
    if (p.length) outfit[slot] = pick(p);
  });
  if (!suppressBag) {
    const bp = pool('bag');
    if (bp.length) outfit.bag = pick(bp);
  }
  if (hasOuter) {
    const op = pool('outer');
    if (op.length) outfit.outer = pick(op);
  }
  return outfit;
}

function buildLocation(tier, room, region, time, tidiness) {
  if (room === 'car') {
    return { arch: '', roomDesc: pick(CAR_INTERIOR[tier]), light: pick(TIME_LIGHT[time]), tidiStr: '' };
  }
  if (room === 'office') {
    return { arch: '', roomDesc: pick(OFFICE[tier]), light: pick(TIME_LIGHT[time]), tidiStr: '' };
  }
  if (room === 'outdoors') {
    return { arch: '', roomDesc: pick(OUTDOORS), light: pick(TIME_LIGHT[time]), tidiStr: '' };
  }
  const arch = pick(ARCH[region]);
  const roomDesc = pick(ROOMS[tier][room]);
  const light = pick(TIME_LIGHT[time]);
  const tidiStr = pick(TIDINESS[tidiness]);
  return { arch, roomDesc, light, tidiStr };
}

// ─────────────────────────────────────────────────────────────────────────────
// OUTPUT FORMATTERS — capture-log register
// ─────────────────────────────────────────────────────────────────────────────
function subjectString(s, gender, region) {
  const gw = (NATIONALITY[region] && NATIONALITY[region][gender]) || (gender === 'F' ? 'woman' : 'man');
  const np = s.notable ? ` ${s.notable}.` : '';
  return `SUBJECT: ${s.age}-year-old ${gw}, ${s.build}, ${s.face}, ${s.skin}, ${s.hair}, ${s.eyes}.${np} No visible makeup.`;
}

function locationString(loc, room) {
  if (room === 'car') {
    return `LOCATION: car interior. ${loc.roomDesc}. ${loc.light}. Not staged.`;
  }
  if (room === 'office') {
    return `LOCATION: office. ${loc.roomDesc}. ${loc.light}. Not staged.`;
  }
  if (room === 'outdoors') {
    return `LOCATION: outdoors. ${loc.roomDesc}. ${loc.light}. Candid, not staged.`;
  }
  const roomLabel = { living:'living room', kitchen:'kitchen', bedroom:'bedroom', bathroom:'bathroom', overview:'apartment interior' }[room];
  const archFirst = trimFirst(loc.arch, 2);
  const roomFirst = loc.roomDesc.split(',').slice(0,3).join(',').trim();
  return `LOCATION: ${roomLabel}, ${archFirst}. ${roomFirst}. ${loc.tidiStr} ${loc.light}. Not staged.`;
}

function wardrobeString(outfit) {
  const order = ['top','bottom','outer','shoes','bag','accessory'];
  const parts = order.filter(k => outfit[k]).map(k => outfit[k]);
  return `WARDROBE: ${parts.join('. ')}.`;
}

function poseString(poseDesc) {
  return `POSE: ${poseDesc}`;
}

function toPrompt(subj, ward, loc, poseDesc, gender, room, region) {
  return [subjectString(subj, gender, region), locationString(loc, room), wardrobeString(ward), poseString(poseDesc)].join('\n\n');
}

// ─────────────────────────────────────────────────────────────────────────────
// LABELS + RANDOM POOLS
// ─────────────────────────────────────────────────────────────────────────────
const REGION_LABELS = { NA:'N. America', UK:'UK', DE:'Germany', NL:'Netherlands' };
const POSE_LABELS   = { talking_cam:'Talking to cam', selfie:'Selfie', earphones:'Earphones', microphone:'Microphone', podcast:'Podcast', fullbody:'Full body', showing_product:'Showing product' };
const TONE_LABELS   = { fair:'Fair', light:'Light', 'light-medium':'Light-Med', medium:'Medium', 'medium-deep':'Med-Deep', deep:'Deep' };
const STYLE_LABELS  = { everyday:'Everyday', elevated:'Elevated', smart:'Smart', social:'Social', offduty:'Off-duty', lounge:'Lounge', active:'Active' };
const TIER_LABELS   = { budget:'Budget', mid:'Mid', established:'Established', affluent:'Affluent', luxury:'Luxury' };
const ROOM_LABELS   = { living:'Living room', kitchen:'Kitchen', bedroom:'Bedroom', bathroom:'Bathroom', overview:'Overview', car:'Car interior', office:'Office', outdoors:'Outdoors' };

const ALL_REGIONS = ['NA','UK','DE','NL'];
const ALL_AGES    = ['18-25','25-35','35-50','45-60','65+'];
const ALL_TONES   = ['fair','light','light-medium','medium','medium-deep','deep'];
const ALL_STYLES  = ['everyday','elevated','smart','social','offduty','lounge','active'];
const ALL_TIERS   = ['budget','mid','established','affluent','luxury'];
const ALL_ROOMS   = ['living','kitchen','bedroom','bathroom','overview','car','office','outdoors'];
const ALL_TIMES       = ['day','night'];
const ALL_TIDINESS    = ['pristine','tidy','lived','messy'];
const ALL_HAIR_LENGTHS = ['xshort','short','medium','long'];
const ALL_HAIR_COLORS  = ['blonde','light-brown','dark-brown','black','auburn','gray','white','age-matched'];
const ALL_POSES        = ['talking_cam','selfie','earphones','microphone','podcast','fullbody','showing_product'];

function resolve(val, options) {
  return val === 'random' ? pick(options) : val;
}

// ─────────────────────────────────────────────────────────────────────────────
// PANEL STATE
// ─────────────────────────────────────────────────────────────────────────────
let sets = [];
let selectedId = null;
const layerMode = { subject:'text', location:'text', wardrobe:'text', pose:'text' };

function setMode(layer, mode) {
  layerMode[layer] = mode;
  ['text','img'].forEach(m => {
    const btn = document.getElementById(`mode-${layer}-${m}`);
    if (btn) btn.classList.toggle('active', m === mode);
  });
  updatePanel();
}

function updatePanel() {
  const preview  = document.getElementById('panel-preview');
  const cardLabel = document.getElementById('panel-card-id');
  const o = sets.find(x => x.id === selectedId);
  if (!o) {
    preview.value = '';
    cardLabel.textContent = 'No card selected';
    return;
  }
  cardLabel.textContent = `Card #${String(o.id).padStart(2,'0')} · ${o.gender==='F'?'F':'M'} ${o.ageRange} · ${REGION_LABELS[o.region]}`;

  const lines = [];
  const chkSubj = document.getElementById('chk-subject');
  const chkLoc  = document.getElementById('chk-location');
  const chkWard = document.getElementById('chk-wardrobe');

  if (chkSubj && chkSubj.checked) {
    lines.push(layerMode.subject === 'img'
      ? 'SUBJECT: [reference image — attach to node]'
      : subjectString(o.subj, o.gender, o.region));
  }
  if (chkLoc && chkLoc.checked) {
    lines.push(layerMode.location === 'img'
      ? 'LOCATION: [reference image — attach to node]'
      : locationString(o.loc, o.room));
  }
  if (chkWard && chkWard.checked) {
    lines.push(layerMode.wardrobe === 'img'
      ? 'WARDROBE: [reference image — attach to node]'
      : wardrobeString(o.ward));
  }
  const chkPose = document.getElementById('chk-pose');
  if (chkPose && chkPose.checked) {
    lines.push(layerMode.pose === 'img'
      ? 'POSE: [reference image — attach to node]'
      : poseString(o.poseDesc));
  }
  preview.value = lines.join('\n\n');
}

function selectCard(id) {
  selectedId = id;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  const cardEl = document.querySelector(`.card[data-id="${id}"]`);
  if (cardEl) cardEl.classList.add('selected');
  updatePanel();
}

// ─────────────────────────────────────────────────────────────────────────────
// GENERATE
// ─────────────────────────────────────────────────────────────────────────────
function generate() {
  const genderRaw = document.getElementById('gender').value;
  const ageMin    = Math.max(18, parseInt(document.getElementById('age-min').value) || 18);
  const ageMax    = Math.min(90, parseInt(document.getElementById('age-max').value) || 50);
  const regionRaw = document.getElementById('region').value;
  const toneRaw   = document.getElementById('tone').value;
  const styleRaw  = document.getElementById('style').value;
  const tierRaw   = document.getElementById('tier').value;
  const roomRaw   = document.getElementById('room').value;
  const timeRaw     = document.getElementById('time').value;
  const tidiRaw     = document.getElementById('tidiness').value;
  const count = Math.min(200, Math.max(1, parseInt(document.getElementById('count').value) || 20));

  const gender = genderRaw; // only 2 options, no random dropdown

  const hairLengthRaw = document.getElementById('hair-length').value;
  const hairColorRaw  = document.getElementById('hair-color').value;
  const bodyTypeRaw   = document.getElementById('body-type').value;
  const poseRaw       = document.getElementById('pose').value;

  const offset = sets.length;
  const newSets = Array.from({ length: count }, (_, i) => {
    const region   = resolve(regionRaw, ALL_REGIONS);
    const style    = resolve(styleRaw,  ALL_STYLES);
    const tier     = resolve(tierRaw,   ALL_TIERS);
    const room     = resolve(roomRaw,   ALL_ROOMS);
    const time     = resolve(timeRaw,   ALL_TIMES);
    const tidiness = resolve(tidiRaw,   ALL_TIDINESS);
    const poseType = resolve(poseRaw,   ALL_POSES);
    const poseDesc = pick(POSE[poseType]);
    const subj = buildSubject(gender, ageMin, ageMax, region, toneRaw, hairLengthRaw, hairColorRaw, bodyTypeRaw);
    const ward = buildWardrobe(gender, ageMin, ageMax, region, style, room, time);
    const loc  = buildLocation(tier, room, region, time, tidiness);
    const ageRange = `${ageMin}–${ageMax}`;
    return { id: offset+i+1, gender, ageMin, ageMax, ageRange, region, tone: toneRaw, style, tier, room, time, tidiness, poseType, poseDesc, subj, ward, loc,
      prompt: toPrompt(subj, ward, loc, poseDesc, gender, room, region) };
  });
  sets = [...sets, ...newSets];

  const TIDI_LABELS = { pristine:'Pristine', tidy:'Tidy', lived:'Lived-in', messy:'Messy' };
  document.getElementById('s-total').textContent = sets.length;
  document.getElementById('s-demo').textContent  = (gender==='F'?'Women':'Men')+` ${ageMin}–${ageMax}`;
  document.getElementById('s-tone').textContent  = toneRaw==='regional' ? 'Regional' : toneRaw==='random' ? 'Mixed' : TONE_LABELS[toneRaw];
  document.getElementById('s-style').textContent = styleRaw==='random' ? 'Mixed' : STYLE_LABELS[styleRaw];
  document.getElementById('s-env').textContent   = (tierRaw==='random'?'Mixed':TIER_LABELS[tierRaw])+' · '+(roomRaw==='random'?'Mixed':ROOM_LABELS[roomRaw])+' · '+(tidiRaw==='random'?'Mixed':TIDI_LABELS[tidiRaw]);
  document.getElementById('stats').style.display = 'flex';
  document.getElementById('dl-row').style.display = 'flex';

  selectedId = null;
  renderList();
  updatePanel();
}

function clearSets() {
  sets = [];
  selectedId = null;
  document.getElementById('list').innerHTML = '';
  document.getElementById('stats').style.display = 'none';
  document.getElementById('dl-row').style.display = 'none';
  updatePanel();
}

// ─────────────────────────────────────────────────────────────────────────────
// GLOBAL RANDOM — one fully-random set, prepended, auto-selected
// ─────────────────────────────────────────────────────────────────────────────
function globalRandom() {
  const gender      = pick(['F','M']);
  const ageMin      = pick([18,22,25,28,30,35,40,45,50,55,60,65]);
  const ageMax      = Math.min(90, ageMin + pick([8,10,12,15]));
  const ageRange    = `${ageMin}–${ageMax}`;
  const region      = pick(ALL_REGIONS);
  const style       = pick(ALL_STYLES);
  const tier        = pick(ALL_TIERS);
  const room        = pick(ALL_ROOMS);
  const time        = pick(ALL_TIMES);
  const tidiness    = pick(ALL_TIDINESS);
  const hairLength  = pick(ALL_HAIR_LENGTHS);
  const hairColor   = 'age-matched';
  const poseType    = pick(ALL_POSES);
  const poseDesc    = pick(POSE[poseType]);

  const subj = buildSubject(gender, ageMin, ageMax, region, 'regional', hairLength, hairColor, 'random');
  const ward = buildWardrobe(gender, ageMin, ageMax, region, style, room, time);
  const loc  = buildLocation(tier, room, region, time, tidiness);

  // Prepend and re-index
  sets.unshift({ id: 0, gender, ageMin, ageMax, ageRange, region, tone:'regional', style, tier, room, time, tidiness, poseType, poseDesc, subj, ward, loc,
    prompt: toPrompt(subj, ward, loc, poseDesc, gender, room, region) });
  sets.forEach((s, i) => s.id = i + 1);

  document.getElementById('s-total').textContent  = sets.length;
  document.getElementById('s-demo').textContent   = (gender==='F'?'Women':'Men')+' '+ageRange;
  document.getElementById('s-tone').textContent   = 'Regional';
  document.getElementById('s-style').textContent  = STYLE_LABELS[style];
  document.getElementById('s-env').textContent    = TIER_LABELS[tier]+' · '+(ROOM_LABELS[room]||room);
  document.getElementById('stats').style.display  = 'flex';
  document.getElementById('dl-row').style.display = 'flex';

  renderList();
  selectCard(1); // new entry always becomes #1
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER LIST
// ─────────────────────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('list');
  list.innerHTML = sets.map(o => {
    const isSel  = o.id === selectedId;
    const preview = `${o.subj.age}yo ${o.gender==='F'?'F':'M'} · ${o.subj.face.split(',')[0]} · ${o.ward.top||''}`;

    const subjSlots = [['age',o.subj.age],['build',o.subj.build],['face',o.subj.face],['skin',o.subj.skin],['hair',o.subj.hair],['eyes',o.subj.eyes],['notable',o.subj.notable||'—']]
      .map(([k,v])=>`<div class="slot-row"><span class="slot-name">${k}</span><span class="slot-val">${v}</span></div>`).join('');

    const wardSlots = ['top','bottom','outer','shoes','bag','accessory']
      .filter(k=>o.ward[k])
      .map(k=>`<div class="slot-row"><span class="slot-name">${k}</span><span class="slot-val">${o.ward[k]}</span></div>`).join('');

    const locSlots = [['architecture',trimFirst(o.loc.arch,2)],['room',o.loc.roomDesc.split(',').slice(0,3).join(',')],['light',o.loc.light]]
      .map(([k,v])=>`<div class="slot-row"><span class="slot-name">${k}</span><span class="slot-val">${v}</span></div>`).join('');

    return `<div class="card${isSel?' selected':''}" data-id="${o.id}">
      <div class="card-head" onclick="selectCard(${o.id})">
        <span class="card-num">#${String(o.id).padStart(2,'0')}</span>
        <span class="card-preview">${preview}</span>
        <button class="btn btn-sm" style="padding:0 8px;min-width:28px;height:26px;font-size:13px;flex-shrink:0;"
          onclick="event.stopPropagation();toggle(${o.id})" id="arr-btn-${o.id}">▾</button>
      </div>
      <div class="card-body" id="body-${o.id}" style="display:none">
        <div class="layer"><div class="layer-label">Subject</div>${subjSlots}</div>
        <div class="layer"><div class="layer-label">Wardrobe</div>${wardSlots}</div>
        <div class="layer"><div class="layer-label">Location</div>${locSlots}</div>
        <div class="layer"><div class="layer-label">Pose</div><div class="slot-row"><span class="slot-name">shot</span><span class="slot-val">${o.poseDesc}</span></div></div>
        <div class="prompt-box">${o.prompt.replace(/\n/g,'<br>')}</div>
        <div class="card-copy-row">
          <button class="btn btn-sm" onclick="copyOne(${o.id})">Copy</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(id) {
  const b   = document.getElementById('body-'+id);
  const btn = document.getElementById('arr-btn-'+id);
  const open = b.style.display !== 'none';
  b.style.display = open ? 'none' : 'block';
  if (btn) btn.textContent = open ? '▾' : '▴';
}

// Formats a set respecting current layer checkboxes + modes — used by all exports
function formatSet(o) {
  const lines = [];
  if (document.getElementById('chk-subject').checked) {
    lines.push(layerMode.subject === 'img'
      ? 'SUBJECT: [reference image — attach to node]'
      : subjectString(o.subj, o.gender, o.region));
  }
  if (document.getElementById('chk-location').checked) {
    lines.push(layerMode.location === 'img'
      ? 'LOCATION: [reference image — attach to node]'
      : locationString(o.loc, o.room));
  }
  if (document.getElementById('chk-wardrobe').checked) {
    lines.push(layerMode.wardrobe === 'img'
      ? 'WARDROBE: [reference image — attach to node]'
      : wardrobeString(o.ward));
  }
  if (document.getElementById('chk-pose').checked) {
    lines.push(layerMode.pose === 'img'
      ? 'POSE: [reference image — attach to node]'
      : poseString(o.poseDesc));
  }
  return lines.join('\n\n');
}

function copyOne(id) {
  const o = sets.find(x => x.id === id);
  navigator.clipboard.writeText(formatSet(o));
}

function copyAll() {
  navigator.clipboard.writeText(sets.map(o => formatSet(o)).join('\n###\n'));
}

function downloadTxt() {
  const g = document.getElementById('gender').value==='F'?'Women':'Men';
  const a = `${document.getElementById('age-min').value}-${document.getElementById('age-max').value}`;
  const r = document.getElementById('region').value;
  const t = document.getElementById('tone').value;
  const s = document.getElementById('style').value;
  const content = sets.map(o => formatSet(o)).join('\n###\n');
  const blob = new Blob([content],{type:'text/plain'});
  const el = document.createElement('a');
  el.href = URL.createObjectURL(blob);
  el.download = `content_layers_${r}_${g}_${a}_${t}_${s}.txt`;
  el.click();
}

function panelCopy() {
  const txt = document.getElementById('panel-preview').value;
  if (txt) navigator.clipboard.writeText(txt);
}

function panelDownload() {
  const txt = document.getElementById('panel-preview').value;
  if (!txt) return;
  const o = sets.find(x => x.id === selectedId);
  const name = o ? `panel_${o.region}_${o.gender}_${o.ageRange}.txt` : 'panel_output.txt';
  const blob = new Blob([txt],{type:'text/plain'});
  const el = document.createElement('a');
  el.href = URL.createObjectURL(blob);
  el.download = name;
  el.click();
}
