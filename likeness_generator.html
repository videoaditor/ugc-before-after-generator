<!DOCTYPE html>

<title>Likeness Generator</title>

* { box-sizing: border-box; margin: 0; padding: 0; }

.controls { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 1.5rem; flex-wrap: wrap; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
select, input[type=number] { height: 36px; padding: 0 10px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #111; font-size: 14px; font-family: inherit; min-width: 150px; }
input[type=number] { min-width: 80px; }
.btn { height: 36px; padding: 0 16px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #111; font-size: 14px; font-family: inherit; cursor: pointer; white-space: nowrap; }
.btn:hover { background: #f5f5f5; }
.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-primary:hover { opacity: 0.85; }
.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
.stats { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat { background: #f5f5f5; border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 80px; }
.stat-val { font-size: 18px; font-weight: 500; }
.stat-label { font-size: 12px; color: #666; margin-top: 2px; }
.lk-list { display: flex; flex-direction: column; gap: 8px; }
.lk-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
.lk-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
.lk-head:hover { background: #f9f9f9; }
.lk-num { font-size: 12px; color: #666; font-weight: 500; }
.lk-preview { font-size: 13px; color: #111; flex: 1; margin: 0 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lk-body { border-top: 0.5px solid #e0e0e0; padding: 12px 14px; }
.slot-row { display: flex; gap: 10px; padding: 5px 0; border-bottom: 0.5px solid #f0f0f0; }
.slot-row:last-child { border-bottom: none; }
.slot-name { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.07em; min-width: 80px; padding-top: 1px; }
.slot-val { font-size: 13px; color: #111; line-height: 1.5; }
.prompt-box { margin-top: 10px; background: #f5f5f5; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #555; line-height: 1.7; font-family: 'SF Mono', 'Fira Code', monospace; }
.copy-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
.dl-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
</style>
</head>

<div class="header">
  <h1>Likeness generator</h1>
  <p>Randomized character descriptors for UGC capture-log SUBJECT field</p>
</div>
<div class="controls">

    <label>Region</label>

  </div>
  <div class="field">
    <label>Gender</label>

      <option value="M">Men</option>
    </select>
  </div>
  <div class="field">
    <label>Age Range</label>
    <select id="age">

      <option value="25-35">25 – 35</option>
      <option value="35-50" selected>35 – 50</option>
      <option value="45-60">45 – 60</option>
      <option value="65+">65+</option>
    </select>
  </div>
  <div class="field">
    <label>Skin Tone</label>

      <option value="light" selected>Light (II–III)</option>
      <option value="light-medium">Light-Medium (III)</option>
      <option value="medium">Medium (IV)</option>
      <option value="medium-deep">Medium-Deep (IV–V)</option>
      <option value="deep">Deep (V–VI)</option>
    </select>
  </div>
  <div class="field">
    <label>Count</label>
    <input type="number" id="count" value="20" min="1" max="200" />
  </div>
  <div class="field">
    <label>&nbsp;</label>
    <button class="btn btn-primary" onclick="generate()">Generate</button>
  </div>
</div>
<div class="stats" id="stats" style="display:none">

</div>
<div class="dl-row" id="dl-row" style="display:none">

  <button class="btn" onclick="copyAll()">Copy all</button>
</div>
<div id="list" class="lk-list"></div>

    "light brown eyes, warm tone, moderate set",
    "dark brown eyes under prominent brow ridge",
    "blue-grey eyes, heavy brow, deep-set",
    "warm brown eyes, round, moderate set"
  ]
};

// ─── NOTABLE FEATURES — ~60% chance ──────────────────────────────────────────
const NOTABLE = {
  F: [
    "light freckling across nose and cheeks",
    "small mole above lip",
    "natural strong brows, ungroomed",
    "thin naturally sparse brows",
    "slight dark circles under eyes",
    "prominent nose, slightly wide at bridge",
    "thin lips, natural colour",
    "full lips, no product",
    "reading glasses, thin metal frame",
    "faint acne scarring at cheeks",
    "slight gap between front teeth",
    "one small visible mole on jaw",
    "strong jaw, slightly asymmetric"
  ],
  M: [
    "light stubble, two to three days growth",
    "short full beard, natural ungroomed shape",
    "heavy stubble, slightly dishevelled",
    "clean shaven, slight redness at jaw from shaving",
    "light freckling across nose",
    "prominent nose, slight bump at bridge",
    "strong brow ridge, naturally bushy brows",
    "slight bags under eyes",
    "reading glasses, simple wire frame",
    "faint acne scarring at jaw and cheeks",
    "wide flat nose, broad at bridge",
    "slight receding at temples, not yet notable"
  ]
};

// ─── AGE-SPECIFIC HAIR ADJUSTMENTS ───────────────────────────────────────────
// Certain notable features shift with age — handled in buildLikeness logic

// ─── CORE BUILD ───────────────────────────────────────────────────────────────
function buildLikeness(gender, ageRange, region, tone) {
  const age = pickAge(ageRange);

  const build = pick(BUILD[gender]);
  const face = pick(FACE[gender]);
  const skin = pick(SKIN[tone][ageRange]);

  // Hair: base pool + regional additions
  const baseHair = HAIR[gender][ageRange] || [];
  const regionalHair = (HAIR_REGIONAL[region] && HAIR_REGIONAL[region][gender] && HAIR_REGIONAL[region][gender][ageRange]) || [];
  const hair = pick([...baseHair, ...regionalHair]);

  const eyes = pick(EYES[gender]);

  // Notable: ~60% chance
  const notable = Math.random() < 0.6 ? pick(NOTABLE[gender]) : null;

  return { age, build, face, skin, hair, eyes, notable };
}

// ─── PROMPT OUTPUT ────────────────────────────────────────────────────────────
function toPrompt(lk, gender) {
  const genderWord = gender === 'F' ? 'woman' : 'man';
  const notablePart = lk.notable ? ` ${lk.notable}.` : '';
  return `SUBJECT: ${lk.age}-year-old ${genderWord}, ${lk.build}, ${lk.face}, ${lk.skin}, ${lk.hair}, ${lk.eyes}.${notablePart} No visible makeup.`;
}

// ─── UI ───────────────────────────────────────────────────────────────────────
const REGION_LABELS = { NA: 'N. America', UK: 'UK', DE: 'Germany', NL: 'Netherlands' };
const TONE_LABELS = {
  fair: 'Fair', light: 'Light', 'light-medium': 'Light-Medium',
  medium: 'Medium', 'medium-deep': 'Medium-Deep', deep: 'Deep'
};
let likenesses = [];

function generate() {
  const gender = document.getElementById('gender').value;
  const ageRange = document.getElementById('age').value;
  const region = document.getElementById('region').value;
  const tone = document.getElementById('tone').value;
  const count = Math.min(200, Math.max(1, parseInt(document.getElementById('count').value) || 20));

  likenesses = Array.from({ length: count }, (_, i) => {
    const lk = buildLikeness(gender, ageRange, region, tone);
    return { id: i + 1, gender, ageRange, region, tone, lk, prompt: toPrompt(lk, gender) };
  });

  const genderLabel = gender === 'F' ? 'Women' : 'Men';
  document.getElementById('s-total').textContent = count;
  document.getElementById('s-demo').textContent = genderLabel + ' ' + ageRange;
  document.getElementById('s-region').textContent = REGION_LABELS[region];
  document.getElementById('s-tone').textContent = TONE_LABELS[tone];
  document.getElementById('stats').style.display = 'flex';
  document.getElementById('dl-row').style.display = 'flex';

  renderList();
}

function renderList() {
  const list = document.getElementById('list');
  list.innerHTML = likenesses.map(o => {
    const preview = `${o.lk.age}yo ${o.gender === 'F' ? 'F' : 'M'} · ${o.lk.face.split(',')[0]} · ${o.lk.hair.split(',')[0]}`;
    const slots = [
      ['age', o.lk.age],
      ['build', o.lk.build],
      ['face', o.lk.face],
      ['skin', o.lk.skin],
      ['hair', o.lk.hair],
      ['eyes', o.lk.eyes],
      ['notable', o.lk.notable || '—']
    ].map(([k, v]) => `<div class="slot-row"><span class="slot-name">${k}</span><span class="slot-val">${v}</span></div>`).join('');

    return `<div class="lk-card">
      <div class="lk-head" onclick="toggle(${o.id})">
        <span class="lk-num">#${String(o.id).padStart(2, '0')}</span>
        <span class="lk-preview">${preview}</span>
        <span style="font-size:12px;color:#888" id="arr-${o.id}">▾</span>
      </div>
      <div class="lk-body" id="body-${o.id}" style="display:none">
        ${slots}
        <div class="prompt-box">${o.prompt}</div>
        <div class="copy-row">
          <button class="btn btn-sm" onclick="copyOne(${o.id})">Copy SUBJECT line</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(id) {
  const b = document.getElementById('body-' + id);
  const a = document.getElementById('arr-' + id);
  const open = b.style.display !== 'none';
  b.style.display = open ? 'none' : 'block';
  a.textContent = open ? '▾' : '▴';
}

function copyOne(id) {
  const o = likenesses.find(x => x.id === id);
  navigator.clipboard.writeText(o.prompt);
}

function copyAll() {
  navigator.clipboard.writeText(likenesses.map(o => o.prompt).join('###'));
}

function downloadTxt() {
  const g = document.getElementById('gender').value === 'F' ? 'Women' : 'Men';
  const a = document.getElementById('age').value;
  const r = document.getElementById('region').value;
  const t = document.getElementById('tone').value;
  const content = likenesses.map(o => o.prompt).join('###');
  const blob = new Blob([content], { type: 'text/plain' });
  const el = document.createElement('a');
  el.href = URL.createObjectURL(blob);
  el.download = `likenesses_${r}_${g}_${a}_${t}.txt`;
  el.click();
}
</script>
