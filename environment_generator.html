<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Environment Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; padding: 2rem; max-width: 920px; margin: 0 auto; }
.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 18px; font-weight: 500; }
.header p { font-size: 13px; color: #666; margin-top: 4px; }
.controls { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 1.5rem; flex-wrap: wrap; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
select, input[type=number] { height: 36px; padding: 0 10px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #111; font-size: 14px; font-family: inherit; min-width: 140px; }
input[type=number] { min-width: 80px; }
.btn { height: 36px; padding: 0 16px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #111; font-size: 14px; font-family: inherit; cursor: pointer; white-space: nowrap; }
.btn:hover { background: #f5f5f5; }
.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-primary:hover { opacity: 0.85; }
.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
.stats { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat { background: #f5f5f5; border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 80px; }
.stat-val { font-size: 18px; font-weight: 500; }
.stat-label { font-size: 12px; color: #666; margin-top: 2px; }
.env-list { display: flex; flex-direction: column; gap: 8px; }
.env-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
.env-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
.env-head:hover { background: #f9f9f9; }
.env-num { font-size: 12px; color: #666; font-weight: 500; }
.env-preview { font-size: 13px; color: #111; flex: 1; margin: 0 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.env-body { border-top: 0.5px solid #e0e0e0; padding: 12px 14px; }
.slot-row { display: flex; gap: 10px; padding: 5px 0; border-bottom: 0.5px solid #f0f0f0; }
.slot-row:last-child { border-bottom: none; }
.slot-name { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.07em; min-width: 90px; padding-top: 1px; }
.slot-val { font-size: 13px; color: #111; line-height: 1.5; }
.prompt-box { margin-top: 10px; background: #f5f5f5; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #555; line-height: 1.6; }
.copy-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
.dl-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<div class="header">
  <h1>Environment generator</h1>
  <p>Randomized interior set references by socioeconomic tier — lifestyle photography format</p>
</div>
<div class="controls">
  <div class="field">
    <label>Region</label>
    <select id="region">
      <option value="NA">North America</option>
      <option value="UK">UK</option>
      <option value="DE" selected>Germany</option>
      <option value="NL">Netherlands</option>
    </select>
  </div>
  <div class="field">
    <label>Tier</label>
    <select id="tier">
      <option value="budget">Budget</option>
      <option value="mid" selected>Mid</option>
      <option value="established">Established</option>
      <option value="affluent">Affluent</option>
      <option value="luxury">Luxury</option>
    </select>
  </div>
  <div class="field">
    <label>Room</label>
    <select id="room">
      <option value="living" selected>Living Room</option>
      <option value="kitchen">Kitchen</option>
      <option value="bedroom">Bedroom</option>
      <option value="bathroom">Bathroom</option>
      <option value="overview">Overview</option>
    </select>
  </div>
  <div class="field">
    <label>Style</label>
    <select id="style">
      <option value="everyday" selected>Everyday</option>
      <option value="elevated">Elevated</option>
      <option value="smart">Smart</option>
      <option value="social">Social</option>
      <option value="offduty">Off-duty</option>
      <option value="lounge">Lounge</option>
      <option value="active">Active</option>
    </select>
  </div>
  <div class="field">
    <label>Time</label>
    <select id="time">
      <option value="day" selected>Day</option>
      <option value="night">Night</option>
    </select>
  </div>
  <div class="field">
    <label>Count</label>
    <input type="number" id="count" value="20" min="1" max="200" />
  </div>
  <div class="field">
    <label>&nbsp;</label>
    <button class="btn btn-primary" onclick="generate()">Generate</button>
  </div>
</div>
<div class="stats" id="stats" style="display:none">
  <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-label">environments</div></div>
  <div class="stat"><div class="stat-val" id="s-tier">—</div><div class="stat-label">tier</div></div>
  <div class="stat"><div class="stat-val" id="s-room">—</div><div class="stat-label">room</div></div>
  <div class="stat"><div class="stat-val" id="s-region">—</div><div class="stat-label">region</div></div>
  <div class="stat"><div class="stat-val" id="s-style">—</div><div class="stat-label">style</div></div>
  <div class="stat"><div class="stat-val" id="s-time">—</div><div class="stat-label">time</div></div>
</div>
<div class="dl-row" id="dl-row" style="display:none">
  <button class="btn" onclick="downloadTxt()">Download .txt (### separated)</button>
  <button class="btn" onclick="copyAll()">Copy all prompts</button>
</div>
<div id="list" class="env-list"></div>

<script>

// ─── REGIONAL ARCHITECTURE ───────────────────────────────────────────────────

// ─── LIGHTING ────────────────────────────────────────────────────────────────
const TIME_LIGHT = {

// ─── LOGIC ───────────────────────────────────────────────────────────────────
function pick(arr) {
  if (!arr || arr.length === 0) return null;
  return arr[Math.floor(Math.random() * arr.length)];
}

function buildEnvironment(tier, room, region, style, time) {
  return {
    architecture: pick(REGIONAL[region]),
    room: pick(ROOMS[tier][room]),
    lighting: pick(TIME_LIGHT[time]),
    mood: pick(STYLE_MOOD[style])
  };
}

const ROOM_LABELS = {
  living: 'Living room', kitchen: 'Kitchen', bedroom: 'Bedroom',
  bathroom: 'Bathroom', overview: 'Overview'
};
const TIER_LABELS = {
  budget: 'Budget', mid: 'Mid', established: 'Established',
  affluent: 'Affluent', luxury: 'Luxury'
};
const REGION_LABELS = { NA: 'N. America', UK: 'UK', DE: 'Germany', NL: 'Netherlands' };
const STYLE_LABELS = {
  everyday: 'Everyday', elevated: 'Elevated', smart: 'Smart',
  social: 'Social', offduty: 'Off-duty', lounge: 'Lounge', active: 'Active'
};
const TIME_LABELS = { day: 'Day', night: 'Night' };

function toPrompt(env, room, tier, region, style, time) {
  const roomLabel = ROOM_LABELS[room];
  const isOverview = room === 'overview';
  const photoStyle = isOverview
    ? 'Interior lifestyle photography. Full apartment overview.'
    : `Interior lifestyle photography. ${roomLabel}.`;
  const tierRegion = `${TIER_LABELS[tier].toLowerCase()} home, ${REGIONAL[region][0].split(',')[0].toLowerCase()} context`;

  return `${photoStyle} ${env.architecture}. ${env.room}. ${env.lighting}. ${env.mood}. Lived-in, not staged. No people. ${isOverview ? 'Wide establishing shot.' : 'Eye-level, 35mm equivalent, natural perspective.'}`;
}

// ─── UI ──────────────────────────────────────────────────────────────────────
let environments = [];

function generate() {
  const tier = document.getElementById('tier').value;
  const room = document.getElementById('room').value;
  const region = document.getElementById('region').value;
  const style = document.getElementById('style').value;
  const time = document.getElementById('time').value;
  const count = Math.min(200, Math.max(1, parseInt(document.getElementById('count').value) || 20));

  environments = Array.from({ length: count }, (_, i) => {
    const env = buildEnvironment(tier, room, region, style, time);
    return { id: i + 1, tier, room, region, style, time, env, prompt: toPrompt(env, room, tier, region, style, time) };
  });

  document.getElementById('s-total').textContent = count;
  document.getElementById('s-tier').textContent = TIER_LABELS[tier];
  document.getElementById('s-room').textContent = ROOM_LABELS[room];
  document.getElementById('s-region').textContent = REGION_LABELS[region];
  document.getElementById('s-style').textContent = STYLE_LABELS[style];
  document.getElementById('s-time').textContent = TIME_LABELS[time];
  document.getElementById('stats').style.display = 'flex';
  document.getElementById('dl-row').style.display = 'flex';

  renderList();
}

function renderList() {
  const list = document.getElementById('list');
  list.innerHTML = environments.map(o => {
    const preview = o.env.architecture;
    const slots = [
      ['architecture', o.env.architecture],
      ['room', o.env.room],
      ['lighting', o.env.lighting],
      ['mood', o.env.mood]
    ].map(([k, v]) => `<div class="slot-row"><span class="slot-name">${k}</span><span class="slot-val">${v}</span></div>`).join('');

    return `<div class="env-card">
      <div class="env-head" onclick="toggle(${o.id})">
        <span class="env-num">#${String(o.id).padStart(2, '0')}</span>
        <span class="env-preview">${preview}</span>
        <span style="font-size:12px;color:#888" id="arr-${o.id}">▾</span>
      </div>
      <div class="env-body" id="body-${o.id}" style="display:none">
        ${slots}
        <div class="prompt-box">${o.prompt}</div>
        <div class="copy-row">
          <button class="btn btn-sm" onclick="copyOne(${o.id})">Copy prompt</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(id) {
  const b = document.getElementById('body-' + id);
  const a = document.getElementById('arr-' + id);
  const open = b.style.display !== 'none';
  b.style.display = open ? 'none' : 'block';
  a.textContent = open ? '▾' : '▴';
}

function copyOne(id) {
  const o = environments.find(x => x.id === id);
  navigator.clipboard.writeText(o.prompt);
}

function copyAll() {
  navigator.clipboard.writeText(environments.map(o => o.prompt).join('###'));
}

function downloadTxt() {
  const tier = document.getElementById('tier').value;
  const room = document.getElementById('room').value;
  const region = document.getElementById('region').value;
  const style = document.getElementById('style').value;
  const time = document.getElementById('time').value;
  const content = environments.map(o => o.prompt).join('###');
  const blob = new Blob([content], { type: 'text/plain' });
  const el = document.createElement('a');
  el.href = URL.createObjectURL(blob);
  el.download = `environments_${region}_${tier}_${room}_${style}_${time}.txt`;
  el.click();
}
</script>
</body>
</html>
