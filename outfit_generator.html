<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outfit Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; padding: 2rem; max-width: 920px; margin: 0 auto; }
.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 18px; font-weight: 500; }
.header p { font-size: 13px; color: #666; margin-top: 4px; }
.controls { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 1.5rem; flex-wrap: wrap; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
select, input[type=number] { height: 36px; padding: 0 10px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #111; font-size: 14px; font-family: inherit; min-width: 150px; }
input[type=number] { min-width: 80px; }
.btn { height: 36px; padding: 0 16px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #111; font-size: 14px; font-family: inherit; cursor: pointer; white-space: nowrap; }
.btn:hover { background: #f5f5f5; }
.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-primary:hover { opacity: 0.85; }
.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
.stats { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat { background: #f5f5f5; border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 90px; }
.stat-val { font-size: 20px; font-weight: 500; }
.stat-label { font-size: 12px; color: #666; margin-top: 2px; }
.outfit-list { display: flex; flex-direction: column; gap: 8px; }
.outfit-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
.outfit-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
.outfit-head:hover { background: #f9f9f9; }
.outfit-num { font-size: 12px; color: #666; font-weight: 500; }
.outfit-preview { font-size: 13px; color: #111; flex: 1; margin: 0 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.outfit-body { border-top: 0.5px solid #e0e0e0; padding: 12px 14px; }
.slot-row { display: flex; gap: 10px; padding: 5px 0; border-bottom: 0.5px solid #f0f0f0; }
.slot-row:last-child { border-bottom: none; }
.slot-name { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.07em; min-width: 80px; padding-top: 1px; }
.slot-val { font-size: 13px; color: #111; }
.prompt-box { margin-top: 10px; background: #f5f5f5; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #555; line-height: 1.6; }
.copy-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
.dl-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<div class="header">
  <h1>Outfit generator</h1>
  <p>Randomized wardrobe packs by demographic</p>
</div>
<div class="controls">
  <div class="field">
    <label>Region</label>
    <select id="region">
      <option value="NA">North America</option>
      <option value="UK">UK</option>
      <option value="DE" selected>Germany</option>
      <option value="NL">Netherlands</option>
    </select>
  </div>
  <div class="field">
    <label>Gender</label>
    <select id="gender">
      <option value="F" selected>Women</option>
      <option value="M">Men</option>
    </select>
  </div>
  <div class="field">
    <label>Age Range</label>
    <select id="age">
      <option value="18-25">18 – 25</option>
      <option value="25-35">25 – 35</option>
      <option value="35-50" selected>35 – 50</option>
      <option value="45-60">45 – 60</option>
      <option value="65+">65+</option>
    </select>
  </div>
  <div class="field">
    <label>Style</label>
    <select id="style">
      <option value="everyday" selected>Everyday</option>
      <option value="elevated">Elevated</option>
      <option value="smart">Smart</option>
      <option value="social">Social</option>
      <option value="offduty">Off-duty</option>
      <option value="lounge">Lounge</option>
      <option value="active">Active</option>
    </select>
  </div>
  <div class="field">
    <label>Count</label>
    <input type="number" id="count" value="20" min="1" max="200" />
  </div>
  <div class="field">
    <label>&nbsp;</label>
    <button class="btn btn-primary" onclick="generate()">Generate</button>
  </div>
</div>
<div class="stats" id="stats" style="display:none">
  <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-label">outfits</div></div>
  <div class="stat"><div class="stat-val" id="s-outer">0</div><div class="stat-label">with outer</div></div>
  <div class="stat"><div class="stat-val" id="s-demo">—</div><div class="stat-label">demographic</div></div>
  <div class="stat"><div class="stat-val" id="s-region">—</div><div class="stat-label">region</div></div>
  <div class="stat"><div class="stat-val" id="s-style">—</div><div class="stat-label">style</div></div>
</div>
<div class="dl-row" id="dl-row" style="display:none">
  <button class="btn" onclick="downloadTxt()">Download .txt (### separated)</button>
  <button class="btn" onclick="copyAll()">Copy all prompts</button>
</div>
<div id="list" class="outfit-list"></div>

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function buildOutfit(gender, ageRange, region, style) {
  const base = TAXONOMY[gender][ageRange];
  const regional = REGIONAL[region][gender];
  const styleData = STYLE[style] ? STYLE[style][gender] : null;

  // dominant: lounge/active replace base entirely
  // flavour: elevated/smart/social/offduty — style items double-weighted into base
  // everyday: base + regional only
  const isDominant = style === 'lounge' || style === 'active';

  function pool(slot) {
    const b = base[slot] || [];
    const r = regional[slot] || [];
    const s = styleData ? (styleData[slot] || []) : [];
    if (isDominant) {
      // style items dominate; sprinkle 2 regional items for texture
      return [...s, ...s, ...r.slice(0, 2)];
    }
    if (s.length > 0) {
      // flavour: style items appear at ~2× frequency
      return [...b, ...s, ...s, ...r];
    }
    return [...b, ...r];
  }

  // lounge: outer always present (cardigan/robe); active: always has outer (jacket)
  // dominant styles: always outer. Others: 65% chance
  const hasOuter = isDominant ? true : Math.random() > 0.35;

  const slots = ['top', 'bottom', 'shoes', 'accessory'];
  const outfit = {};
  slots.forEach(slot => {
    const p = pool(slot);
    if (p.length > 0) outfit[slot] = pick(p);
  });

  // bag: lounge has no bag
  if (style !== 'lounge') {
    const bagPool = pool('bag');
    if (bagPool.length > 0) outfit.bag = pick(bagPool);
  }

  if (hasOuter) {
    const outerPool = pool('outer');
    if (outerPool.length > 0) outfit.outer = pick(outerPool);
  }

  return outfit;
}

const STYLE_LABELS = {
  everyday: 'Everyday', elevated: 'Elevated', smart: 'Smart',
  social: 'Social', offduty: 'Off-duty', lounge: 'Lounge', active: 'Active'
};

function toPrompt(outfit, gender, style) {
  const label = gender === 'F' ? "Women's" : "Men's";
  const styleLabel = STYLE_LABELS[style] || '';
  const items = Object.values(outfit).join('. ');
  return `Flat lay product photography on a plain white background. ${label} ${styleLabel.toLowerCase()} outfit, items neatly folded and arranged with even spacing, shot from directly above. Items: ${items}. Natural diffused light, no shadows, no model, no props, no background texture.`;
}

// ─── UI ───────────────────────────────────────────────────────────────────────
const REGION_LABELS = { NA: 'N. America', UK: 'UK', DE: 'Germany', NL: 'Netherlands' };
let outfits = [];

function generate() {
  const gender = document.getElementById('gender').value;
  const ageRange = document.getElementById('age').value;
  const region = document.getElementById('region').value;
  const style = document.getElementById('style').value;
  const count = Math.min(200, Math.max(1, parseInt(document.getElementById('count').value) || 20));

  outfits = Array.from({ length: count }, (_, i) => {
    const outfit = buildOutfit(gender, ageRange, region, style);
    return { id: i + 1, gender, ageRange, region, style, outfit, prompt: toPrompt(outfit, gender, style) };
  });

  const withOuter = outfits.filter(o => o.outfit.outer).length;
  const genderLabel = gender === 'F' ? 'Women' : 'Men';

  document.getElementById('s-total').textContent = count;
  document.getElementById('s-outer').textContent = withOuter;
  document.getElementById('s-demo').textContent = genderLabel + ' ' + ageRange;
  document.getElementById('s-region').textContent = REGION_LABELS[region];
  document.getElementById('s-style').textContent = STYLE_LABELS[style];
  document.getElementById('stats').style.display = 'flex';
  document.getElementById('dl-row').style.display = 'flex';

  renderList();
}

function renderList() {
  const list = document.getElementById('list');
  list.innerHTML = outfits.map(o => {
    const preview = o.outfit.top + ' · ' + o.outfit.bottom;
    const slots = Object.entries(o.outfit)
      .map(([k, v]) => `<div class="slot-row"><span class="slot-name">${k}</span><span class="slot-val">${v}</span></div>`)
      .join('');
    return `<div class="outfit-card">
      <div class="outfit-head" onclick="toggle(${o.id})">
        <span class="outfit-num">#${String(o.id).padStart(2, '0')}</span>
        <span class="outfit-preview">${preview}</span>
        <span style="font-size:12px;color:#888" id="arr-${o.id}">▾</span>
      </div>
      <div class="outfit-body" id="body-${o.id}" style="display:none">
        ${slots}
        <div class="prompt-box">${o.prompt}</div>
        <div class="copy-row">
          <button class="btn btn-sm" onclick="copyOne(${o.id})">Copy prompt</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(id) {
  const b = document.getElementById('body-' + id);
  const a = document.getElementById('arr-' + id);
  const open = b.style.display !== 'none';
  b.style.display = open ? 'none' : 'block';
  a.textContent = open ? '▾' : '▴';
}

function copyOne(id) {
  const o = outfits.find(x => x.id === id);
  navigator.clipboard.writeText(o.prompt);
}

function copyAll() {
  navigator.clipboard.writeText(outfits.map(o => o.prompt).join('###'));
}

function downloadTxt() {
  const g = document.getElementById('gender').value === 'F' ? 'Women' : 'Men';
  const a = document.getElementById('age').value;
  const r = document.getElementById('region').value;
  const s = document.getElementById('style').value;
  const content = outfits.map(o => o.prompt).join('###');
  const blob = new Blob([content], { type: 'text/plain' });
  const el = document.createElement('a');
  el.href = URL.createObjectURL(blob);
  el.download = `outfits_${r}_${g}_${a}_${s}.txt`;
  el.click();
}
</script>
