<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before / After Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; padding: 2rem; }
.layout { display: grid; grid-template-columns: 380px 1fr; gap: 2rem; max-width: 1200px; margin: 0 auto; align-items: start; }
.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 18px; font-weight: 500; }
.header p { font-size: 13px; color: #666; margin-top: 4px; }

.panel { border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.panel-title { font-size: 10px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 0.5px solid #f0f0f0; }
.panel.before-bar { border-left: 3px solid #ccc; }
.panel.after-bar  { border-left: 3px solid #111; }

.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.field:last-child { margin-bottom: 0; }
.field label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
select, input[type=number], input[type=text], input[type=url] {
  height: 32px; padding: 0 9px; border: 0.5px solid #ccc; border-radius: 7px;
  background: #fff; color: #111; font-size: 13px; font-family: inherit; width: 100%; }
textarea {
  width: 100%; padding: 9px 10px; border: 0.5px solid #ccc; border-radius: 7px;
  background: #fff; color: #111; font-size: 13px; font-family: inherit; resize: vertical; line-height: 1.5; }
.field-row { display: flex; gap: 8px; }
.field-row .field { flex: 1; min-width: 0; }
input[type=number] { min-width: 54px; }

.btn { height: 32px; padding: 0 14px; border: 0.5px solid #ccc; border-radius: 7px; background: #fff; color: #111; font-size: 13px; font-family: inherit; cursor: pointer; white-space: nowrap; }
.btn:hover { background: #f5f5f5; }
.btn-primary { background: #111; color: #fff; border-color: #111; width: 100%; height: 38px; font-size: 13px; margin-top: 4px; }
.btn-primary:hover { opacity: 0.85; }
.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
.btn-dark { background: #111; color: #fff; border-color: #111; }
.btn-dark:hover { opacity: 0.85; }
.btn-wide { width: 100%; }

.upload-zone { border: 0.5px dashed #ccc; border-radius: 9px; padding: 20px; text-align: center; cursor: pointer; position: relative; transition: border-color 0.15s, background 0.15s; }
.upload-zone:hover { border-color: #111; background: #fafafa; }
.upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-zone-text { font-size: 13px; color: #888; pointer-events: none; }
.upload-zone-text span { color: #111; }
.img-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; }
.or-row { text-align: center; font-size: 11px; color: #bbb; margin: 8px 0; }

.ward-toggle { display: flex; border: 0.5px solid #ddd; border-radius: 7px; overflow: hidden; margin-bottom: 10px; }
.ward-btn { flex: 1; height: 30px; font-size: 12px; font-family: inherit; border: none; background: #fff; color: #888; cursor: pointer; transition: background 0.1s, color 0.1s; }
.ward-btn.active { background: #111; color: #fff; }

.right-col { position: sticky; top: 2rem; }
.out-label { font-size: 10px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.out-label-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.out-label-dot.before { background: #ccc; }
.out-label-dot.after  { background: #111; }
.out-box { width: 100%; min-height: 260px; padding: 12px; border: 0.5px solid #e0e0e0; border-radius: 9px; font-size: 11.5px; font-family: 'SF Mono', 'Fira Code', monospace; color: #333; line-height: 1.85; resize: vertical; background: #fafafa; }
.out-box:focus { outline: none; border-color: #bbb; }
.out-actions { display: flex; gap: 8px; margin: 8px 0 18px; }
.divider-out { height: 0.5px; background: #eee; margin: 16px 0; }
.ward-cards { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }
.ward-card { padding: 8px 10px; border: 0.5px solid #ddd; border-radius: 7px; font-size: 11.5px; color: #444; cursor: pointer; line-height: 1.6; transition: border-color 0.1s; }
.ward-card:hover { border-color: #999; background: #fafafa; }
.ward-card.selected { border: 1.5px solid #111; background: #f5f5f5; color: #111; }
.ward-gen-row { display: flex; gap: 6px; margin-top: 6px; }
.ward-gen-row .btn { flex: 1; }
</style>
</head>
<body>
<div style="max-width:1200px;margin:0 auto;">

<div class="header">
  <h1>Before / After Generator</h1>
  <p>Reference image + desired effect → paired BEFORE / AFTER prompt blocks</p>
</div>

<div class="layout">

<!-- ─── LEFT — Controls ─── -->
<div class="left">

  <!-- REFERENCE -->
  <div class="panel">
    <div class="panel-title">Reference image</div>
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="ref-file" accept="image/*" onchange="handleFile(this)">
      <div class="upload-zone-text">Drop image, <span>click to upload</span>, or paste from clipboard</div>
    </div>
    <img class="img-preview" id="img-preview" alt="Reference">
    <button id="ref-clear" class="btn btn-sm btn-wide" onclick="clearReference()" style="display:none;margin-top:8px;">Clear ×</button>
    <div class="or-row">or</div>
    <div class="field">
      <label>Image URL</label>
      <input type="url" id="ref-url" placeholder="https://…" oninput="handleUrl(this.value)">
    </div>
  </div>

  <!-- EFFECT -->
  <div class="panel">
    <div class="panel-title">Transformation</div>
    <div class="field">
      <label>Desired effect — after state</label>
      <textarea id="effect" rows="3" placeholder="smoother skin, more energetic, tidier hair, 20 pounds less, reduced redness…"></textarea>
    </div>
    <div class="field">
      <label>Starting state — optional (auto-derived if blank)</label>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;">
        <button class="btn btn-sm" onclick="addChip('overweight — heavier build, fuller face, rounder midsection')">overweight</button>
        <button class="btn btn-sm" onclick="addChip('visible wrinkles, expression lines, uneven skin texture')">wrinkles</button>
        <button class="btn btn-sm" onclick="addChip('dull, uneven skin tone, visible redness')">dull skin</button>
        <button class="btn btn-sm" onclick="addChip('lethargic, low energy, heavy eyelids, slouched posture')">lethargic</button>
        <button class="btn btn-sm" onclick="addChip('flat, unstyled hair, limp or unkempt')">bad hair</button>
        <button class="btn btn-sm" onclick="addChip('visible puffiness, slight bloating')">puffy</button>
        <button class="btn btn-sm" onclick="addChip('pronounced dark circles under eyes')">dark circles</button>
        <button class="btn btn-sm" onclick="addChip('visible blemishes, uneven skin')">blemishes</button>
      </div>
      <textarea id="before-state" rows="2" placeholder="dull skin, lethargic, flat hair…"></textarea>
    </div>
  </div>

  <!-- SUBJECT CONTEXT -->
  <div class="panel">
    <div class="panel-title">Subject context — wardrobe matching</div>
    <div class="field-row">
      <div class="field">
        <label>Gender</label>
        <select id="gender">
          <option value="F" selected>Women</option>
          <option value="M">Men</option>
        </select>
      </div>
      <div class="field">
        <label>Region</label>
        <select id="region">
          <option value="random">— Random —</option>
          <option value="NA">N. America</option>
          <option value="UK">UK</option>
          <option value="DE" selected>Germany</option>
          <option value="NL">Netherlands</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Age range</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <input type="number" id="age-min" value="28" min="18" max="90" style="width:58px;">
        <span style="font-size:12px;color:#aaa;">–</span>
        <input type="number" id="age-max" value="42" min="18" max="90" style="width:58px;">
      </div>
    </div>
  </div>

  <!-- WARDROBE MODE -->
  <div class="panel">
    <div class="panel-title">Wardrobe</div>
    <div class="ward-toggle">
      <button class="ward-btn active" id="ward-same-btn" onclick="setWardMode('same')">Same outfit both days</button>
      <button class="ward-btn" id="ward-diff-btn" onclick="setWardMode('diff')">Different outfits</button>
    </div>
    <div id="ward-same-controls">
      <div class="field-row">
        <div class="field">
          <label>Style</label>
          <select id="style-shared">
            <option value="random">— Random —</option>
            <option value="everyday" selected>Everyday</option>
            <option value="elevated">Elevated</option>
            <option value="smart">Smart</option>
            <option value="social">Social</option>
            <option value="offduty">Off-duty</option>
            <option value="lounge">Lounge</option>
            <option value="active">Active</option>
          </select>
        </div>
      </div>
      <div class="ward-gen-row">
        <button class="btn btn-sm" onclick="genWardCards('shared')">Generate options</button>
      </div>
      <div id="ward-cards-shared" class="ward-cards"></div>
    </div>
    <div id="ward-diff-controls" style="display:none;">
      <div class="field-row">
        <div class="field">
          <label>Before style</label>
          <select id="style-before">
            <option value="random">— Random —</option>
            <option value="everyday">Everyday</option>
            <option value="elevated">Elevated</option>
            <option value="smart">Smart</option>
            <option value="social">Social</option>
            <option value="offduty">Off-duty</option>
            <option value="lounge" selected>Lounge</option>
            <option value="active">Active</option>
          </select>
        </div>
        <div class="field">
          <label>After style</label>
          <select id="style-after">
            <option value="random">— Random —</option>
            <option value="everyday" selected>Everyday</option>
            <option value="elevated">Elevated</option>
            <option value="smart">Smart</option>
            <option value="social">Social</option>
            <option value="offduty">Off-duty</option>
            <option value="lounge">Lounge</option>
            <option value="active">Active</option>
          </select>
        </div>
      </div>
      <div class="ward-gen-row">
        <button class="btn btn-sm" onclick="genWardCards('before')">Before options</button>
        <button class="btn btn-sm" onclick="genWardCards('after')">After options</button>
      </div>
      <div id="ward-cards-before" class="ward-cards"></div>
      <div id="ward-cards-after" class="ward-cards"></div>
    </div>
  </div>

  <!-- BEFORE ENVIRONMENT -->
  <div class="panel before-bar">
    <div class="panel-title">Before — environment</div>
    <div class="field-row">
      <div class="field">
        <label>Scene</label>
        <select id="before-room">
          <option value="random">— Random —</option>
          <option value="living" selected>Living Room</option>
          <option value="kitchen">Kitchen</option>
          <option value="bedroom">Bedroom</option>
          <option value="bathroom">Bathroom</option>
          <option value="overview">Overview</option>
          <option value="car">Car Interior</option>
          <option value="office">Office</option>
          <option value="outdoors">Outdoors</option>
        </select>
      </div>
      <div class="field">
        <label>Tier</label>
        <select id="before-tier">
          <option value="random">— Random —</option>
          <option value="budget">Budget</option>
          <option value="mid" selected>Mid</option>
          <option value="established">Established</option>
          <option value="affluent">Affluent</option>
          <option value="luxury">Luxury</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Time</label>
        <select id="before-time">
          <option value="day" selected>Day</option>
          <option value="night">Night</option>
        </select>
      </div>
      <div class="field">
        <label>Space</label>
        <select id="before-tidiness">
          <option value="random">— Random —</option>
          <option value="pristine">Pristine</option>
          <option value="tidy">Tidy</option>
          <option value="lived" selected>Lived-in</option>
          <option value="messy">Messy</option>
        </select>
      </div>
    </div>
  </div>

  <!-- AFTER ENVIRONMENT -->
  <div class="panel after-bar">
    <div class="panel-title">After — environment</div>
    <div class="field-row">
      <div class="field">
        <label>Scene</label>
        <select id="after-room">
          <option value="random">— Random —</option>
          <option value="living" selected>Living Room</option>
          <option value="kitchen">Kitchen</option>
          <option value="bedroom">Bedroom</option>
          <option value="bathroom">Bathroom</option>
          <option value="overview">Overview</option>
          <option value="car">Car Interior</option>
          <option value="office">Office</option>
          <option value="outdoors">Outdoors</option>
        </select>
      </div>
      <div class="field">
        <label>Tier</label>
        <select id="after-tier">
          <option value="random">— Random —</option>
          <option value="budget">Budget</option>
          <option value="mid" selected>Mid</option>
          <option value="established">Established</option>
          <option value="affluent">Affluent</option>
          <option value="luxury">Luxury</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Time</label>
        <select id="after-time">
          <option value="day">Day</option>
          <option value="night" selected>Night</option>
        </select>
      </div>
      <div class="field">
        <label>Space</label>
        <select id="after-tidiness">
          <option value="random">— Random —</option>
          <option value="pristine">Pristine</option>
          <option value="tidy" selected>Tidy</option>
          <option value="lived">Lived-in</option>
          <option value="messy">Messy</option>
        </select>
      </div>
    </div>
    <div style="margin-top:8px;">
      <button class="btn btn-sm btn-wide" onclick="mirrorScene()">↑ Same scene, different day</button>
    </div>
  </div>

  <!-- SHOT TYPE -->
  <div class="panel">
    <div class="panel-title">Shot type</div>
    <div class="field">
      <select id="shot-type">
        <option value="auto" selected>— Auto (derived from effect) —</option>
        <option value="mirror">Mirror</option>
        <option value="selfie">Selfie</option>
        <option value="fixed">Fixed / Tripod</option>
        <option value="beauty">Beauty shot</option>
        <option value="close_crop">Close crop</option>
        <option value="candid">Candid</option>
        <option value="side_profile">Side profile</option>
        <option value="overhead">Overhead</option>
      </select>
    </div>
  </div>

  <button class="btn btn-primary" onclick="generate()">Generate before / after</button>

</div><!-- /left -->

<!-- ─── RIGHT — Output ─── -->
<div class="right-col">

  <div>
    <div class="out-label"><span class="out-label-dot before"></span>Before</div>
    <textarea class="out-box" id="out-before" readonly placeholder="Output appears here after generating…"></textarea>
    <div class="out-actions">
      <button class="btn btn-sm btn-dark" onclick="copyOut('before')">Copy before</button>
    </div>
  </div>

  <div class="divider-out"></div>

  <div>
    <div class="out-label"><span class="out-label-dot after"></span>After</div>
    <textarea class="out-box" id="out-after" readonly placeholder="Output appears here after generating…"></textarea>
    <div class="out-actions">
      <button class="btn btn-sm btn-dark" onclick="copyOut('after')">Copy after</button>
      <button class="btn btn-sm" onclick="copyBoth()">Copy both</button>
    </div>
  </div>

</div><!-- /right -->
</div><!-- /layout -->
</div><!-- /wrapper -->

<script>
// ─────────────────────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────────────────────
function pick(arr) { if (!arr || !arr.length) return ''; return arr[Math.floor(Math.random() * arr.length)]; }
function pickAge(lo, hi) {
  lo = parseInt(lo); hi = parseInt(hi);
  if (lo > hi) [lo, hi] = [hi, lo];
  return Math.floor(Math.random() * (hi - lo + 1)) + lo;
}
function ageToKey(age) {
  if (age <= 25) return '18-25';
  if (age <= 35) return '25-35';
  if (age <= 50) return '35-50';
  if (age <= 60) return '45-60';
  return '65+';
}
function trimFirst(str, n) { return str.split(',').slice(0,n).join(',').trim(); }
function resolve(val, options) { return val === 'random' ? pick(options) : val; }

// BUILD FUNCTIONS

function getContextStyle(style, room, time) {
  if (room === 'bathroom') return 'lounge';
  if (room === 'bedroom' && time === 'night') return 'lounge';
  if (room === 'bedroom' && time === 'day') return Math.random() < 0.6 ? 'lounge' : style;
  if (room === 'office') {
    if (style === 'lounge' || style === 'active') return pick(['everyday','elevated','smart']);
    return style;
  }
  if (room === 'outdoors') {
    if (style === 'lounge') return pick(['everyday','offduty','active']);
    return style;
  }
  if (room === 'car') {
    if (style === 'lounge') return pick(['everyday','offduty','elevated']);
    return style;
  }
  return style;
}

function buildWardrobe(gender, ageMin, ageMax, region, style, room, time) {
  const effectiveStyle = getContextStyle(style, room, time);
  const age = pickAge(ageMin, ageMax);
  const ageRange = ageToKey(age);
  const base = TAXONOMY[gender][ageRange];
  const regional = REGIONAL_WARD[region][gender];
  const isDominant = effectiveStyle === 'lounge' || effectiveStyle === 'active';
  const styleData = STYLE_WARD[effectiveStyle] ? STYLE_WARD[effectiveStyle][gender] : null;

  function pool(slot) {
    const b = base[slot] || [];
    const r = regional[slot] || [];
    const s = styleData ? (styleData[slot] || []) : [];
    if (isDominant && s.length) return [...s, ...s, ...r.slice(0,2)];
    if (s.length) return [...b, ...s, ...s, ...r];
    return [...b, ...r];
  }

  const outerChance = room === 'outdoors' ? 0.85 : (isDominant ? 1 : 0.65);
  const hasOuter = Math.random() < outerChance;
  const suppressBag = effectiveStyle === 'lounge' || room === 'bathroom' || room === 'car';
  const outfit = {};
  ['top','bottom','shoes','accessory'].forEach(slot => {
    const p = pool(slot);
    if (p.length) outfit[slot] = pick(p);
  });
  if (!suppressBag) { const bp = pool('bag'); if (bp.length) outfit.bag = pick(bp); }
  if (hasOuter) { const op = pool('outer'); if (op.length) outfit.outer = pick(op); }
  return outfit;
}

function outfitStr(outfit) {
  return ['top','bottom','outer','shoes','bag','accessory'].filter(k => outfit[k]).map(k => outfit[k]).join('. ') + '.';
}

function buildLocation(tier, room, region, time, tidiness) {
  if (room === 'car')     return { arch:'', roomDesc: pick(CAR_INTERIOR[tier]), light: pick(TIME_LIGHT[time]), tidiStr:'' };
  if (room === 'office')  return { arch:'', roomDesc: pick(OFFICE[tier]),       light: pick(TIME_LIGHT[time]), tidiStr:'' };
  if (room === 'outdoors') return { arch:'', roomDesc: pick(OUTDOORS),          light: pick(TIME_LIGHT[time]), tidiStr:'' };
  const arch     = pick(ARCH[region]);
  const roomDesc = pick(ROOMS[tier][room]);
  const light    = pick(TIME_LIGHT[time]);
  const tidiStr  = pick(TIDINESS[tidiness]);
  return { arch, roomDesc, light, tidiStr };
}

function locStrBefore(loc, room) {
  if (room === 'car')      return `LOCATION: car interior. ${loc.roomDesc}. ${loc.light}. Not staged.`;
  if (room === 'office')   return `LOCATION: office. ${loc.roomDesc}. ${loc.light}. Not staged.`;
  if (room === 'outdoors') return `LOCATION: outdoors. ${loc.roomDesc}. ${loc.light}. Candid, not staged.`;
  const labels = { living:'living room', kitchen:'kitchen', bedroom:'bedroom', bathroom:'bathroom', overview:'apartment interior' };
  const archPart = trimFirst(loc.arch, 2);
  const roomPart = loc.roomDesc.split(',').slice(0,3).join(',').trim();
  return `LOCATION: ${labels[room]}, ${archPart}. ${roomPart}. ${loc.tidiStr} ${loc.light}. Not staged.`;
}

function locStrAfter(loc, room, sameScene) {
  if (room === 'car')      return `LOCATION: car interior${sameScene ? ' — different day, same vehicle' : ''}. ${loc.roomDesc}. ${loc.light}. Not staged.`;
  if (room === 'office')   return `LOCATION: office${sameScene ? ' — different day, same space' : ''}. ${loc.roomDesc}. ${loc.light}. Not staged.`;
  if (room === 'outdoors') return `LOCATION: outdoors${sameScene ? ' — different day, same spot' : ''}. ${loc.roomDesc}. ${loc.light}. Candid, not staged.`;
  const labels = { living:'living room', kitchen:'kitchen', bedroom:'bedroom', bathroom:'bathroom', overview:'apartment interior' };
  const archPart = trimFirst(loc.arch, 2);
  const roomPart = loc.roomDesc.split(',').slice(0,3).join(',').trim();
  if (sameScene) {
    return `LOCATION: same ${labels[room]}, different day — same space, same interior. ${archPart}. ${roomPart}. ${loc.tidiStr} ${loc.light}. Not staged.`;
  }
  return `LOCATION: ${labels[room]}, ${archPart}. ${roomPart}. ${loc.tidiStr} ${loc.light}. Not staged.`;
}

  auto: null,
  mirror: {
    before: 'reflected in mirror, upper body and face visible in reflection — candid self-assessment, slight distance from mirror, no camera or phone visible in frame, low energy in posture',
    after:  'reflected in same mirror, same framing — upright, visibly pleased with reflection, no camera or phone visible in frame'
  },
  selfie: {
    before: 'selfie angle, phone held at arm\'s length slightly above eye level, front-camera perspective, natural unstaged expression, low energy',
    after:  'selfie angle, same framing and height as before, upright and confident, slight natural smile'
  },
  fixed: {
    before: 'mid-shot, camera placed on stable surface at distance, person unaware of framing — candid, natural posture, no camera props visible',
    after:  'same fixed angle and distance as before, different day — person relaxed, facing frame naturally'
  },
  beauty: {
    before: 'close portrait, flat even frontal lighting, clean neutral background — intentionally unglamorous baseline, no ring light, no styling',
    after:  'close portrait, ring light setup, high-key beauty lighting, skin luminous and flawless, face fills frame — intentionally over-produced and flattering, exaggerated improvement'
  },
  close_crop: {
    before: 'extreme close crop on face — direct neutral lighting, no makeup, concerns visible at close range, unflattering angle',
    after:  'extreme close crop, same tight framing and angle — skin visibly improved at close range, same focal area'
  },
  candid: {
    before: 'candid mid-action in environment, subject not posing, natural unstaged movement, low energy visible in body language',
    after:  'candid in same space, natural unstaged movement, different day — energy and presence visibly higher'
  },
  side_profile: {
    before: '90-degree side profile, face and body in clean profile view, natural lighting, candid expression, relaxed posture',
    after:  'same 90-degree side profile, same side of face — transformation visible from the side, upright posture'
  },
  overhead: {
    before: 'overhead angle, camera directly above, subject looking upward toward lens, lying down or seated below camera, face fills upper portion of frame, low energy expression',
    after:  'same overhead angle and framing, subject looking upward — visibly transformed from above, relaxed and open expression'
  }
};

function derivePoseFromShot(shotType, effectText) {
  if (!shotType || shotType === 'auto') return derivePoses(effectText);
  const s = SHOT_TYPE[shotType];
  return s ? { before: s.before, after: s.after } : derivePoses(effectText);
}

function deriveBeforeState(effectText) {
  const t = effectText.toLowerCase();
  const parts = [];
  const patterns = [
    { r: /energetic|energy|vitality|lively|active/,       v: 'low energy, slightly fatigued expression, posture somewhat slumped' },
    { r: /lethargic|tired|fatigue|sluggish/,               v: 'visibly lethargic, heavy eyelids, low energy in posture' },
    { r: /smooth.*skin|skin.*smooth|glow|complexion|radiant|plump/, v: 'dull uneven skin tone, visible surface texture, slight redness' },
    { r: /hair|volum/,                                     v: 'flat unstyled hair, slightly limp or unkempt' },
    { r: /tidy/,                                           v: 'slightly unkempt overall appearance' },
    { r: /pound|weight|slim|lean|loss|thin/,               v: 'visibly fuller build' },
    { r: /confident|mood|happy|positive|uplifted/,         v: 'subdued expression, low energy in posture and face' },
    { r: /redness|inflam|calm.*skin/,                      v: 'visible redness and inflammation across skin' },
    { r: /puff|bloat|swell/,                               v: 'visible puffiness, slight bloating' },
    { r: /dark.*circle|under.*eye|eye.*bag/,               v: 'pronounced dark circles under eyes, fatigued look' },
    { r: /wrinkl|fine.*line/,                              v: 'visible fine lines and skin texture' },
    { r: /clear.*skin|blemish|acne|spot/,                  v: 'visible blemishes or uneven skin' },
  ];
  for (const p of patterns) { if (p.r.test(t)) parts.push(p.v); }
  return parts.length ? parts.join(', ') : 'baseline state before transformation';
}

// Per-dimension instructions telling the model to deviate FROM the reference image
function deriveReferenceDeviation(effectText) {
  const t = effectText.toLowerCase();
  const deviations = [];
  if (/pound|weight|slim|lean|loss|thin/.test(t))
    deviations.push('body should be visibly heavier than reference — softer figure, fuller face, less defined waist, rounder midsection');
  if (/hair|volum/.test(t))
    deviations.push('hair should be visibly worse than reference — flat, unstyled, slightly unkempt or dishevelled');
  if (/smooth.*skin|skin.*smooth|glow|complexion|radiant|plump|clear.*skin|blemish|acne|spot|redness|inflam|wrinkl|fine.*line|dark.*circle|puff|bloat/.test(t))
    deviations.push('skin should be visibly worse than reference — dull, uneven, textured');
  if (/energetic|energy|vitality|lively|confident|mood|happy|positive/.test(t))
    deviations.push('posture and expression should be visibly lower energy than reference — slightly slouched, fatigued');
  if (!deviations.length) return null;
  return `Use reference for identity only. ${deviations.join('. ')}. This is the BEFORE — intentionally below reference quality in these dimensions.`;
}

function derivePoses(effectText) {
  const t = effectText.toLowerCase();
  const isBody = /pound|weight|slim|lean|loss|body|full.body/.test(t);
  if (isBody) {
    return {
      before: 'full body, standing, facing camera, neutral expression, arms relaxed at sides, natural posture, soft neutral background — clean edge separation',
      after:  'full body, standing, facing camera, same angle and framing as before, upright and relaxed, neutral background — clean edge separation'
    };
  }
  return {
    before: 'portrait, close crop, direct eye contact, low energy visible in expression and posture, candid and unposed',
    after:  'portrait, close crop, direct eye contact, upright and relaxed, natural confidence, candid and genuine'
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// UI STATE
// ─────────────────────────────────────────────────────────────────────────────
let wardMode = 'same';
let refSrc = null;

function setWardMode(mode) {
  wardMode = mode;
  selectedWardShared = null; selectedWardBefore = null; selectedWardAfter = null;
  ['shared','before','after'].forEach(w => { const el = document.getElementById(`ward-cards-${w}`); if (el) el.innerHTML = ''; });
  document.getElementById('ward-same-controls').style.display = mode === 'same' ? '' : 'none';
  document.getElementById('ward-diff-controls').style.display = mode === 'diff' ? '' : 'none';
  document.getElementById('ward-same-btn').classList.toggle('active', mode === 'same');
  document.getElementById('ward-diff-btn').classList.toggle('active', mode === 'diff');
}

function setReference(src, label) {
  refSrc = src;
  const preview = document.getElementById('img-preview');
  preview.src = src;
  preview.style.display = 'block';
  document.querySelector('.upload-zone-text').innerHTML = `<span>${label}</span>`;
  document.getElementById('ref-clear').style.display = '';
}

function clearReference() {
  refSrc = null;
  const preview = document.getElementById('img-preview');
  preview.style.display = 'none';
  preview.src = '';
  document.getElementById('ref-url').value = '';
  document.querySelector('.upload-zone-text').innerHTML = `Drop image, <span>click to upload</span>, or paste from clipboard`;
  document.getElementById('ref-clear').style.display = 'none';
}

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { setReference(e.target.result, file.name); document.getElementById('ref-url').value = ''; };
  reader.readAsDataURL(file);
}

function handleUrl(url) {
  if (url.trim()) setReference(url.trim(), url.trim());
}

// Clipboard paste support
document.addEventListener('paste', function(e) {
  const items = (e.clipboardData || e.originalEvent.clipboardData || {}).items || [];
  for (const item of items) {
    if (item.type.indexOf('image') !== -1) {
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = ev => setReference(ev.target.result, 'Pasted image');
      reader.readAsDataURL(file);
      e.preventDefault();
      break;
    }
  }
});

// ─── Wardrobe card generator ───────────────────────────────────────────────
let selectedWardShared = null;
let selectedWardBefore = null;
let selectedWardAfter  = null;

function genWardCards(which) {
  const gender = document.getElementById('gender').value;
  const ageMin = parseInt(document.getElementById('age-min').value) || 28;
  const ageMax = parseInt(document.getElementById('age-max').value) || 42;
  const region = resolve(document.getElementById('region').value, ALL_REGIONS);
  const styleId = which === 'after' ? 'style-after' : which === 'before' ? 'style-before' : 'style-shared';
  const roomId  = which === 'after' ? 'after-room' : 'before-room';
  const timeId  = which === 'after' ? 'after-time' : 'before-time';
  const style   = resolve(document.getElementById(styleId).value, ALL_STYLES);
  const room    = resolve(document.getElementById(roomId).value, ALL_ROOMS);
  const time    = document.getElementById(timeId).value;
  const container = document.getElementById(`ward-cards-${which}`);
  container.innerHTML = '';
  if (which === 'shared') selectedWardShared = null;
  else if (which === 'before') selectedWardBefore = null;
  else selectedWardAfter = null;
  for (let i = 0; i < 5; i++) {
    const ward = buildWardrobe(gender, ageMin, ageMax, region, style, room, time);
    const str  = outfitStr(ward);
    const card = document.createElement('div');
    card.className = 'ward-card';
    card.textContent = str;
    card.onclick = () => {
      container.querySelectorAll('.ward-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      if (which === 'shared') selectedWardShared = str;
      else if (which === 'before') selectedWardBefore = str;
      else selectedWardAfter = str;
    };
    container.appendChild(card);
  }
}

function addChip(text) {
  const el = document.getElementById('before-state');
  el.value = el.value ? el.value.trimEnd() + ', ' + text : text;
}

function mirrorScene() {
  const beforeRoom = document.getElementById('before-room').value;
  const beforeTier = document.getElementById('before-tier').value;
  const beforeTime = document.getElementById('before-time').value;
  const beforeTidi = document.getElementById('before-tidiness').value;
  document.getElementById('after-room').value = beforeRoom;
  document.getElementById('after-tier').value = beforeTier;
  document.getElementById('after-time').value = beforeTime === 'day' ? 'night' : 'day';
  const shift = { random:'tidy', pristine:'pristine', tidy:'pristine', lived:'tidy', messy:'lived' };
  document.getElementById('after-tidiness').value = shift[beforeTidi] || 'tidy';
}

// ─────────────────────────────────────────────────────────────────────────────
// GENERATE
// ─────────────────────────────────────────────────────────────────────────────
function generate() {
  const effectText = document.getElementById('effect').value.trim();
  if (!effectText) { document.getElementById('effect').focus(); document.getElementById('effect').style.borderColor = '#f00'; return; }
  document.getElementById('effect').style.borderColor = '';

  const gender   = document.getElementById('gender').value;
  const ageMin   = parseInt(document.getElementById('age-min').value) || 28;
  const ageMax   = parseInt(document.getElementById('age-max').value) || 42;
  const region   = resolve(document.getElementById('region').value, ALL_REGIONS);
  const beforeOverride = document.getElementById('before-state').value.trim();

  const beforeRoomRaw = document.getElementById('before-room').value;
  const afterRoomRaw  = document.getElementById('after-room').value;
  const beforeRoom    = resolve(beforeRoomRaw, ALL_ROOMS);
  const afterRoom     = resolve(afterRoomRaw, ALL_ROOMS);
  const beforeTier    = resolve(document.getElementById('before-tier').value, ALL_TIERS);
  const afterTier     = resolve(document.getElementById('after-tier').value, ALL_TIERS);
  const beforeTime    = document.getElementById('before-time').value;
  const afterTime     = document.getElementById('after-time').value;
  const beforeTidi    = resolve(document.getElementById('before-tidiness').value, ALL_TIDINESS);
  const afterTidi     = resolve(document.getElementById('after-tidiness').value, ALL_TIDINESS);
  const sameScene     = beforeRoom === afterRoom;

  // Wardrobe — use selected card string if picked, otherwise auto-generate
  let wardBeforeStr, wardAfterStr;
  if (wardMode === 'same') {
    wardBeforeStr = selectedWardShared || outfitStr(buildWardrobe(gender, ageMin, ageMax, region, resolve(document.getElementById('style-shared').value, ALL_STYLES), beforeRoom, beforeTime));
    wardAfterStr  = wardBeforeStr;
  } else {
    wardBeforeStr = selectedWardBefore || outfitStr(buildWardrobe(gender, ageMin, ageMax, region, resolve(document.getElementById('style-before').value, ALL_STYLES), beforeRoom, beforeTime));
    wardAfterStr  = selectedWardAfter  || outfitStr(buildWardrobe(gender, ageMin, ageMax, region, resolve(document.getElementById('style-after').value, ALL_STYLES), afterRoom, afterTime));
  }

  // Location
  const locBefore = buildLocation(beforeTier, beforeRoom, region, beforeTime, beforeTidi);
  const locAfterRaw = buildLocation(afterTier, afterRoom, region, afterTime, afterTidi);
  // Same scene: lock arch + roomDesc from BEFORE so the model gets the identical room. Only light + tidiness change.
  const locAfter = sameScene
    ? { arch: locBefore.arch, roomDesc: locBefore.roomDesc, light: locAfterRaw.light, tidiStr: locAfterRaw.tidiStr }
    : locAfterRaw;

  // States
  const beforeState = beforeOverride || deriveBeforeState(effectText);
  const afterState  = effectText;
  const shotType = document.getElementById('shot-type').value;
  const { before: poseBefore, after: poseAfter } = derivePoseFromShot(shotType, effectText);
  const refDeviation = deriveReferenceDeviation(effectText);

  // Reference
  const refTag = refSrc
    ? (refSrc.startsWith('http') ? `[reference image: ${refSrc}]` : '[reference image attached]')
    : '[no reference provided — generate subject from context]';

  // BEFORE subject: use ref for identity, but deviate in relevant dimensions
  const beforeSubjectLine = refDeviation
    ? `SUBJECT: ${refTag}. ${refDeviation} Before state: ${beforeState}. No visible makeup.`
    : `SUBJECT: ${refTag}. Baseline state — ${beforeState}. No visible makeup.`;

  // AFTER subject: match reference closely, show improvement
  const afterSubjectLine = `SUBJECT: [same reference — same person, different day]. Match reference closely — this is the AFTER state. ${afterState}. No visible makeup.`;

  const beforePrompt = [
    beforeSubjectLine,
    locStrBefore(locBefore, beforeRoom),
    `WARDROBE: ${wardBeforeStr}`,
    `POSE: ${poseBefore}.`
  ].join('\n\n');

  const sameWardNote = wardMode === 'same' ? ' [same outfit as before]' : '';
  const afterPrompt = [
    afterSubjectLine,
    locStrAfter(locAfter, afterRoom, sameScene),
    `WARDROBE: ${wardAfterStr}${sameWardNote}`,
    `POSE: ${poseAfter}.`
  ].join('\n\n');

  document.getElementById('out-before').value = beforePrompt;
  document.getElementById('out-after').value  = afterPrompt;
}

function copyOut(which) {
  const txt = document.getElementById('out-' + which).value;
  if (txt) navigator.clipboard.writeText(txt);
}

function copyBoth() {
  const b = document.getElementById('out-before').value;
  const a = document.getElementById('out-after').value;
  if (b || a) navigator.clipboard.writeText(`BEFORE\n\n${b}\n\n${'─'.repeat(40)}\n\nAFTER\n\n${a}`);
}
